services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_QDRANT_HOST=qdrant
      - APP_QDRANT_PORT=6333
    depends_on:
      - qdrant
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_data:
